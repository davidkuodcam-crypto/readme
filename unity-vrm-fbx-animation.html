<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 加入 maximum-scale=1.0 防止手機點擊輸入框時意外放大畫面 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRM & VRMA 動作播放器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 50%, #ffe0b2 100%); font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        .glass-panel {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            flex-direction: column;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #3b82f6;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text" class="text-base sm:text-lg">載入中...</p>
    </div>

    <!-- 遊戲模式提示 UI (預設隱藏) -->
    <div id="game-ui-hint" class="fixed top-5 left-1/2 -translate-x-1/2 z-20 bg-black/60 text-white px-5 py-2.5 rounded-full backdrop-blur-md text-sm border border-white/20 shadow-lg hidden">
        🎮 <b>遊戲模式</b>：使用 <kbd class="bg-white/20 px-1.5 py-0.5 rounded text-yellow-300">W</kbd> <kbd class="bg-white/20 px-1.5 py-0.5 rounded text-yellow-300">A</kbd> <kbd class="bg-white/20 px-1.5 py-0.5 rounded text-yellow-300">S</kbd> <kbd class="bg-white/20 px-1.5 py-0.5 rounded text-yellow-300">D</kbd> 移動 | 按 <kbd class="bg-red-500/80 px-1.5 py-0.5 rounded text-white font-bold">ESC</kbd> 退出
    </div>

    <!-- UI 控制面板 (響應式：手機緊湊、平板並排、桌面寬扁) -->
    <div id="main-ui-panel" class="fixed bottom-3 sm:bottom-5 left-1/2 -translate-x-1/2 z-10 w-[96vw] max-w-5xl">
        <div class="glass-panel p-3 sm:p-4 text-white shadow-xl">
            <!-- 核心排版容器 -->
            <div class="flex flex-col lg:flex-row gap-3 sm:gap-4 items-center justify-between">
                
                <!-- 標題與手機版重置按鈕 -->
                <div class="flex justify-between items-center w-full lg:w-auto shrink-0 border-b border-white/10 pb-2 lg:border-0 lg:pb-0">
                    <div>
                        <h1 class="text-base sm:text-lg lg:text-xl font-bold text-yellow-300 tracking-wider">VRM 動作播放器</h1>
                        <div class="text-[10px] sm:text-xs text-gray-300 hidden sm:block mt-0.5">左鍵:旋轉 | 右鍵:平移 | 滾輪:縮放</div>
                    </div>
                    <!-- 手機/平板版 顯示的重置與暫停按鈕 -->
                    <div class="flex flex-col gap-1.5 lg:hidden">
                        <button class="btn-reset-cam bg-white/10 hover:bg-white/20 py-1.5 px-3 rounded-lg transition font-medium text-[11px] sm:text-xs border border-white/10 shadow active:scale-95 whitespace-nowrap">重置視角</button>
                        <button class="btn-play-pause bg-white/10 hover:bg-white/20 py-1.5 px-3 rounded-lg transition font-medium text-[11px] sm:text-xs border border-white/10 shadow active:scale-95 whitespace-nowrap text-blue-200 disabled:opacity-50 disabled:cursor-not-allowed" disabled>暫停/播放</button>
                        <button class="btn-game-mode bg-green-600/80 hover:bg-green-500 py-1.5 px-3 rounded-lg transition font-medium text-[11px] sm:text-xs border border-white/10 shadow active:scale-95 whitespace-nowrap text-white disabled:opacity-50 disabled:cursor-not-allowed" disabled>🎮 遊戲模式</button>
                    </div>
                </div>

                <!-- 檔案載入區塊 (手機直排，平板/桌面橫排) -->
                <div class="flex flex-col sm:flex-row gap-2 w-full lg:flex-1 lg:px-4 lg:border-x border-white/20">
                    <div class="flex-1 bg-black/30 p-2 sm:p-2.5 rounded-lg border border-white/10 flex flex-col justify-center">
                        <label class="block text-[11px] sm:text-xs font-medium text-gray-200 mb-1">1. 載入模型 (.vrm)</label>
                        <input type="file" id="vrm-input" accept=".vrm" class="block w-full text-[11px] sm:text-xs text-slate-300
                            file:mr-2 file:py-1 sm:file:py-1.5 file:px-3 sm:file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white file:font-semibold
                            hover:file:bg-blue-700 cursor-pointer transition">
                    </div>
                    <div class="flex-1 bg-black/30 p-2 sm:p-2.5 rounded-lg border border-white/10 flex flex-col justify-center">
                        <label class="block text-[11px] sm:text-xs font-medium text-gray-200 mb-1">2. 載入動畫 (.vrma)</label>
                        <input type="file" id="vrma-input" accept=".vrma" disabled class="block w-full text-[11px] sm:text-xs text-slate-300
                            file:mr-2 file:py-1 sm:file:py-1.5 file:px-3 sm:file:px-4 file:rounded-full file:border-0 file:bg-gray-600 file:text-white file:font-semibold
                            disabled:opacity-50 cursor-pointer transition" title="請先載入 VRM 模型">
                    </div>
                </div>

                <!-- 狀態顯示與桌面版重置按鈕 -->
                <div class="flex justify-between items-center w-full lg:w-auto shrink-0 gap-3">
                    <div id="status-panel" class="text-[10px] sm:text-xs w-full flex justify-between lg:flex-col lg:text-right gap-1 px-1 lg:px-0">
                        <p id="vrm-info" class="text-blue-200 truncate max-w-[42vw] lg:max-w-[150px]">模型：未載入</p>
                        <p id="vrma-info" class="text-purple-200 truncate max-w-[42vw] lg:max-w-[150px]">動畫：無</p>
                    </div>
                    <!-- 桌面版 顯示的重置與暫停按鈕 -->
                    <div class="hidden lg:flex flex-col gap-2">
                        <button class="btn-reset-cam bg-white/10 hover:bg-white/20 py-2 px-4 rounded-lg transition font-medium text-sm border border-white/10 shadow active:scale-95 whitespace-nowrap">重置視角</button>
                        <button class="btn-play-pause bg-white/10 hover:bg-white/20 py-2 px-4 rounded-lg transition font-medium text-sm border border-white/10 shadow active:scale-95 whitespace-nowrap text-blue-200 disabled:opacity-50 disabled:cursor-not-allowed" disabled>暫停/播放</button>
                        <button class="btn-game-mode bg-green-600/80 hover:bg-green-500 py-2 px-4 rounded-lg transition font-medium text-sm border border-white/10 shadow active:scale-95 whitespace-nowrap text-white disabled:opacity-50 disabled:cursor-not-allowed" disabled>🎮 遊戲模式</button>
                    </div>
                </div>

            </div>
            
            <!-- 手機版專屬操作提示 -->
            <div class="text-[10px] text-gray-400 text-center mt-2 sm:hidden tracking-wide">
                單指旋轉 | 雙指縮放與平移
            </div>
        </div>
    </div>

    <!-- 腳本引入 -->
    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.0.0/lib/three-vrm.module.js",
                "@pixiv/three-vrm-animation": "https://unpkg.com/@pixiv/three-vrm-animation@3.0.0/lib/three-vrm-animation.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
        import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from '@pixiv/three-vrm-animation';

        // --- 全域變數 ---
        let scene, camera, renderer, controls, clock;
        let currentVrm = null;
        let mixer = null;
        let currentVrmAnimation = null; // ⭐ 新增：儲存目前載入的動畫資料
        
        let particlesMesh;
        const particlesCount = 300;
        let particleData = [];

        // ⭐ 新增：遊戲模式狀態與按鍵追蹤
        let isGameMode = false;
        const keys = { w: false, a: false, s: false, d: false };
        const moveSpeed = 3.0; // 移動速度

        const vrmInput = document.getElementById('vrm-input');
        const vrmaInput = document.getElementById('vrma-input');
        const loadingOverlay = document.getElementById('loading-overlay');
        const statusPanel = document.getElementById('status-panel');
        const vrmInfo = document.getElementById('vrm-info');
        const vrmaInfo = document.getElementById('vrma-info');

        init();

        function init() {
            // 場景設定
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xfff8e1);
            scene.fog = new THREE.Fog(0xfff8e1, 5, 15);

            // 攝影機
            camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.4, 3);

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.body.appendChild(renderer.domElement);

            // 控制器
            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 1.2, 0);
            // 手機版優化: 阻尼感讓滑動更滑順
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.update();

            // ==========================================
            // ⭐ 基礎全局光源 (數值已寫死) ⭐
            // ==========================================
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.50); // 環境光: 0.50
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffedd5, 1.50); // 主向光: 1.50
            directionalLight.position.set(-1.0, 2.0, 1.0).normalize();
            scene.add(directionalLight);

            const fillLight = new THREE.DirectionalLight(0xffd700, 0.60); // 側補光: 0.60
            fillLight.position.set(1.0, 1.0, 1.0).normalize();
            scene.add(fillLight);

            // 地板
            const gridHelper = new THREE.GridHelper(20, 20, 0xd32f2f, 0xffcc80);
            scene.add(gridHelper);

            clock = new THREE.Clock();

            // 建立背景白煙特效
            createSmokeParticles();

            // 視窗縮放
            window.addEventListener('resize', onWindowResize);

            // 事件監聽：模型與動畫
            vrmInput.addEventListener('change', (e) => loadVRM(e.target.files[0]));
            vrmaInput.addEventListener('change', (e) => loadVRMA(e.target.files[0]));
            
            // 綁定所有視角重置按鈕 (響應式設計中有兩個)
            document.querySelectorAll('.btn-reset-cam').forEach(btn => {
                btn.onclick = () => {
                    camera.position.set(0, 1.4, 3);
                    controls.target.set(0, 1.2, 0);
                    controls.update();
                };
            });

            // ⭐ 綁定所有暫停/播放按鈕
            let isPlaying = true;
            document.querySelectorAll('.btn-play-pause').forEach(btn => {
                btn.onclick = () => {
                    if (!mixer) return;
                    isPlaying = !isPlaying;
                    mixer.timeScale = isPlaying ? 1 : 0;
                    
                    document.querySelectorAll('.btn-play-pause').forEach(b => {
                        b.innerText = isPlaying ? "暫停/播放" : "▶ 繼續播放";
                        if (!isPlaying) {
                            b.classList.add('bg-blue-600/60', 'text-white');
                            b.classList.remove('bg-white/10', 'text-blue-200');
                        } else {
                            b.classList.remove('bg-blue-600/60', 'text-white');
                            b.classList.add('bg-white/10', 'text-blue-200');
                        }
                    });
                };
            });

            // ⭐ 綁定遊戲模式按鈕與鍵盤事件
            document.querySelectorAll('.btn-game-mode').forEach(btn => {
                btn.onclick = () => {
                    if (!currentVrm) return;
                    isGameMode = true;
                    document.getElementById('main-ui-panel').style.display = 'none'; // 隱藏主面板
                    document.getElementById('game-ui-hint').style.display = 'block'; // 顯示操作提示
                };
            });

            // 監聽鍵盤按下事件
            window.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                if (k === 'w') keys.w = true;
                if (k === 'a') keys.a = true;
                if (k === 's') keys.s = true;
                if (k === 'd') keys.d = true;
                
                // 按 ESC 退出遊戲模式
                if (e.key === 'Escape' && isGameMode) {
                    isGameMode = false;
                    document.getElementById('main-ui-panel').style.display = 'block';
                    document.getElementById('game-ui-hint').style.display = 'none';
                    
                    // 退回時稍微重置一下目標位置，以防視角跑掉
                    controls.target.copy(currentVrm.scene.position).add(new THREE.Vector3(0, 1.2, 0));
                }
            });

            // 監聽鍵盤放開事件
            window.addEventListener('keyup', (e) => {
                const k = e.key.toLowerCase();
                if (k === 'w') keys.w = false;
                if (k === 'a') keys.a = false;
                if (k === 's') keys.s = false;
                if (k === 'd') keys.d = false;
            });

            animate();
        }

        // --- 產生柔和邊緣的材質 (用於白煙) ---
        function createSmokeTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)'); 
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)'); 
            context.fillStyle = gradient;
            context.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        // --- 白煙特效 ---
        function createSmokeParticles() {
            const geometry = new THREE.BufferGeometry();
            const posArray = new Float32Array(particlesCount * 3);
            const colorArray = new Float32Array(particlesCount * 3);
            
            for(let i = 0; i < particlesCount; i++) {
                const radius = Math.random() * 1.5 + 0.3; 
                const angle = Math.random() * Math.PI * 2; 
                const y = Math.random() * 2.5;             
                const speed = (Math.random() * 0.015 + 0.005); 
                const floatSpeed = Math.random() * 0.01 + 0.005; 
                
                particleData.push({ radius, angle, y, speed, floatSpeed });

                posArray[i*3] = Math.cos(angle) * radius;     
                posArray[i*3+1] = y;                          
                posArray[i*3+2] = Math.sin(angle) * radius;   

                const shade = Math.random() * 0.2 + 0.8; 
                colorArray[i*3] = shade;
                colorArray[i*3+1] = shade;
                colorArray[i*3+2] = shade;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
            
            const material = new THREE.PointsMaterial({
                size: 1.5, 
                map: createSmokeTexture(), 
                vertexColors: true,
                transparent: true,
                opacity: 0.15, 
                depthWrite: false, 
            });
            
            particlesMesh = new THREE.Points(geometry, material);
            scene.add(particlesMesh);
        }

        // --- 核心邏輯：載入 VRM ---
        async function loadVRM(file) {
            if (!file) return;
            
            showLoading(`正在載入模型：${file.name}`);

            if (currentVrm) {
                scene.remove(currentVrm.scene);
                currentVrm = null;
                mixer = null;
            }

            const url = URL.createObjectURL(file);
            const loader = new GLTFLoader();

            loader.register((parser) => {
                return new VRMLoaderPlugin(parser);
            });

            try {
                const gltf = await loader.loadAsync(url);
                const vrm = gltf.userData.vrm;
                
                if (!vrm) throw new Error('檔案中未發現 VRM 資料');

                VRMUtils.rotateVRM0(vrm);

                // ==========================================
                // ⭐ 角色綁定點光 (數值已寫死，移除輔助線) ⭐
                // ==========================================
                function attachLight(boneName, offset, color, intensity, distance) {
                    const bone = vrm.humanoid.getNormalizedBoneNode(boneName);
                    if (!bone) return;

                    // 建立點光源並綁定
                    const light = new THREE.PointLight(color, intensity, distance);
                    light.position.copy(offset);
                    bone.add(light);
                }

                // 身體主光源：強度 1.10
                attachLight('spine', new THREE.Vector3(0, 0.2, -0.6), 0xffddaa, 1.10, 3.5);
                
                // 腿部輔助光：強度 0.40
                attachLight('hips', new THREE.Vector3(0, -0.1, -0.6), 0xffffff, 0.40, 3.5);

                // --- 後方點光 (數值與前方相同，Z軸相反以照向後腦/背部/後腿) ---
                attachLight('spine', new THREE.Vector3(0, 0.2, 0.6), 0xffddaa, 1.10, 3.5);
                attachLight('hips', new THREE.Vector3(0, -0.1, 0.6), 0xffffff, 0.40, 3.5);
                // ==========================================

                currentVrm = vrm;
                scene.add(vrm.scene);

                // ⭐ 新增：如果已經有載入過的動畫，直接套用到新模型上
                if (currentVrmAnimation) {
                    mixer = new THREE.AnimationMixer(currentVrm.scene);
                    
                    // 保持原本的暫停/播放狀態
                    const playBtn = document.querySelector('.btn-play-pause');
                    if (playBtn && playBtn.innerText.includes('繼續')) mixer.timeScale = 0;

                    const clip = createVRMAnimationClip(currentVrmAnimation, currentVrm);
                    const action = mixer.clipAction(clip);
                    action.play();
                    
                    // 啟用暫停/播放按鈕
                    document.querySelectorAll('.btn-play-pause').forEach(b => b.disabled = false);
                }

                vrmInfo.innerText = `模型：${file.name}`;
                statusPanel.classList.remove('hidden');
                vrmaInput.disabled = false;
                vrmaInput.classList.replace('bg-gray-600', 'bg-purple-600');
                
                // ⭐ 啟用遊戲模式按鈕
                document.querySelectorAll('.btn-game-mode').forEach(b => b.disabled = false);

                hideLoading();
            } catch (error) {
                console.error('VRM 載入錯誤:', error);
                hideLoading();
                showErrorMessage('載入模型失敗，請檢查檔案格式。');
            }
        }

        // --- 核心邏輯：載入 VRMA ---
        async function loadVRMA(file) {
            if (!file || !currentVrm) return;

            showLoading(`正在載入動畫：${file.name}`);

            const url = URL.createObjectURL(file);
            const loader = new GLTFLoader();

            loader.register((parser) => {
                return new VRMAnimationLoaderPlugin(parser);
            });

            try {
                const gltf = await loader.loadAsync(url);
                const vrmAnimations = gltf.userData.vrmAnimations;
                
                if (vrmAnimations && vrmAnimations.length > 0) {
                    const vrmAnimation = vrmAnimations[0];
                    currentVrmAnimation = vrmAnimation; // ⭐ 新增：將動畫資料儲存到全域變數

                    mixer = new THREE.AnimationMixer(currentVrm.scene);
                    
                    const clip = createVRMAnimationClip(vrmAnimation, currentVrm);
                    const action = mixer.clipAction(clip);
                    action.play();

                    vrmaInfo.innerText = `動畫：${file.name}`;
                    
                    // 啟用暫停/播放按鈕
                    document.querySelectorAll('.btn-play-pause').forEach(btn => btn.disabled = false);
                } else {
                    throw new Error('該檔案中不含動畫資料');
                }

                hideLoading();
            } catch (error) {
                console.error('VRMA 載入錯誤:', error);
                hideLoading();
                showErrorMessage('載入動畫失敗：' + error.message);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // ⭐ 遊戲模式：第三人稱 WASD 移動邏輯
            if (isGameMode && currentVrm) {
                const moveAmt = moveSpeed * delta;
                
                // 取得攝影機面向的前方與右方向量 (忽略 Y 軸以維持在平面移動)
                const forward = new THREE.Vector3();
                camera.getWorldDirection(forward);
                forward.y = 0;
                forward.normalize();
                
                const right = new THREE.Vector3();
                right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

                const movement = new THREE.Vector3(0, 0, 0);
                if (keys.w) movement.add(forward);
                if (keys.s) movement.sub(forward);
                if (keys.a) movement.sub(right);
                if (keys.d) movement.add(right);

                // 如果有按下移動鍵
                if (movement.lengthSq() > 0) {
                    movement.normalize().multiplyScalar(moveAmt);
                    currentVrm.scene.position.add(movement);

                    // ⭐ 修正：讓角色轉向面朝移動方向
                    // 因 VRM 模型正面為 -Z 軸，lookAt 預設對齊 +Z 軸，因此目標位置需改為反向 (sub)
                    const targetPos = currentVrm.scene.position.clone().sub(movement);
                    currentVrm.scene.lookAt(targetPos);
                    
                    // 讓攝影機的焦點 (OrbitControls target) 即時平滑跟隨角色
                    controls.target.copy(currentVrm.scene.position).add(new THREE.Vector3(0, 1.2, 0));
                }
            }

            // 更新 OrbitControls 阻尼
            controls.update();

            // 粒子動畫
            if (particlesMesh) {
                const positions = particlesMesh.geometry.attributes.position.array;
                for(let i = 0; i < particlesCount; i++) {
                    const data = particleData[i];
                    
                    data.angle += data.speed;
                    data.y += data.floatSpeed;
                    
                    if (data.y > 2.5) {
                        data.y = 0;
                    }

                    positions[i*3] = Math.cos(data.angle) * data.radius;
                    positions[i*3+1] = data.y;
                    positions[i*3+2] = Math.sin(data.angle) * data.radius;
                }
                particlesMesh.geometry.attributes.position.needsUpdate = true;
            }

            if (mixer) mixer.update(delta);
            if (currentVrm) currentVrm.update(delta);

            renderer.render(scene, camera);
        }

        // --- UI 輔助函數 ---
        function showLoading(text) {
            loadingOverlay.style.display = 'flex';
            document.getElementById('loading-text').innerText = text;
        }

        function hideLoading() {
            loadingOverlay.style.display = 'none';
        }

        function showErrorMessage(msg) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'fixed bottom-5 right-5 bg-red-600 text-white px-4 py-2 rounded shadow-lg z-50 text-sm sm:text-base';
            errorDiv.innerText = msg;
            document.body.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 4000);
        }
    </script>
</body>
</html>
